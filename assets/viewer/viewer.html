<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MD Preview Viewer</title>
  <link rel="stylesheet" href="katex.min.css" />
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <div id="content"></div>
  <script src="marked.min.js"></script>
  <script src="highlight.min.js"></script>
  <script src="mermaid.min.js"></script>
  <script src="katex.min.js"></script>
  <script>
    // Read the language + code from the URL fragment.
    // Format: #lang=<urlencoded lang>&code=<urlencoded code>
    function parseFragment() {
      const frag = decodeURIComponent(location.hash.slice(1));
      const out = {};
      frag.split('&').forEach(p => {
        const i = p.indexOf('=');
        if (i < 0) return;
        out[p.slice(0, i)] = decodeURIComponent(p.slice(i + 1));
      });
      return out;
    }
    const { lang, code } = parseFragment();
    const target = document.getElementById('content');
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    document.body.classList.toggle('dark', dark);

    if (lang === 'mermaid') {
      const pre = document.createElement('pre');
      pre.className = 'mermaid';
      pre.textContent = code;
      target.appendChild(pre);
      mermaid.initialize({ startOnLoad: true, theme: dark ? 'dark' : 'default' });
    } else {
      // math
      target.innerHTML = katex.renderToString(code, {
        displayMode: true,
        throwOnError: false,
      });
    }
  </script>
</body>
</html>
